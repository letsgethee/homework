<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과제 제출 현황</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1D9E75;--g2:#0F6E56;--gbg:#E1F5EE;--gbdr:#9FE1CB;
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0efeb;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#9b9b9b;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;--text:#f0f0f0;--text2:#a0a0a0;--text3:#666;--border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem 1rem}
.wrap{max-width:920px;margin:0 auto}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.topbar h1{font-size:20px;font-weight:600;flex:1}
.chips{display:flex;gap:6px}
.chip{background:var(--bg2);border-radius:var(--r);padding:5px 12px;font-size:12px;color:var(--text2);border:0.5px solid var(--border)}
.chip b{color:var(--text);font-weight:600}
.save-row{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.dot{width:6px;height:6px;border-radius:50%;background:#888;transition:background .3s}
.dot.ok{background:var(--g)}.dot.err{background:#E24B4A}
.toolbar{display:flex;gap:6px;margin-bottom:1.2rem;flex-wrap:wrap;align-items:center}
.tbtn{padding:6px 13px;border-radius:var(--r);border:0.5px solid var(--border);font-size:12px;cursor:pointer;background:var(--bg);color:var(--text2);transition:all .12s}
.tbtn:hover{background:var(--bg2)}
.tbtn.on{background:var(--g);color:#fff;border-color:var(--g2)}
.sep{width:1px;height:20px;background:var(--border)}
.search{padding:6px 10px;border-radius:var(--r);border:0.5px solid var(--border);font-size:12px;background:var(--bg);color:var(--text);width:130px;margin-left:auto;outline:none}
.search:focus{border-color:var(--g)}
.section{margin-bottom:1.5rem}
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sec-lbl{font-size:13px;font-weight:600;color:var(--text2);background:var(--bg2);padding:3px 10px;border-radius:var(--r);border:0.5px solid var(--border)}
.sec-stat{font-size:12px;color:var(--text3)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:7px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:10px 12px}
.card.done{border-color:var(--gbdr);background:var(--gbg)}
.card.absent{border-color:#F09595;background:#FCEBEB}
.card.urgent{border-color:#FAC775;background:#FAEEDA}
@media(prefers-color-scheme:dark){.card.done{background:#0a2e20}.card.absent{background:#2e0a0a}.card.urgent{background:#2e2000}}
.card-top{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;background:var(--bg3);color:var(--text2)}
.card.done .av{background:#9FE1CB;color:#085041}
.card.absent .av{background:#F7C1C1;color:#791F1F}
.card.urgent .av{background:#FAC775;color:#633806}
.ng{flex:1;min-width:0;display:flex;align-items:baseline;gap:5px;overflow:hidden}
.sname{font-size:14px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gtag{font-size:10px;color:var(--text3);background:var(--bg2);border:0.5px solid var(--border);border-radius:20px;padding:1px 6px;white-space:nowrap;flex-shrink:0}
.card.done .gtag{background:#9FE1CB;color:#085041;border-color:#5DCAA5}
.card.absent .gtag{background:#F7C1C1;color:#791F1F;border-color:#F09595}
.card.urgent .gtag{background:#FAC775;color:#633806;border-color:#EF9F27}
.dbadge{font-size:10px;padding:2px 6px;border-radius:20px;border:0.5px solid var(--border);color:var(--text3);background:var(--bg2);white-space:nowrap;flex-shrink:0;cursor:pointer}
.card.urgent .dbadge{background:#FAC775;color:#633806;border-color:#EF9F27}
.card.done .dbadge{background:#9FE1CB;color:#085041;border-color:#5DCAA5}
.pips{display:flex;gap:3px}
.pip{flex:1;height:34px;border-radius:6px;border:0.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--bg2);transition:all .12s;min-width:0}
.pip:hover{border-color:var(--g)}
.pip.ck{background:var(--g);border-color:var(--g2)}
.pip.td{border-color:#378ADD;background:#E6F1FB}
.pip.td.ck{background:var(--g);border-color:var(--g2)}
.pn{font-size:10px;color:var(--text3);line-height:1}
.pd{font-size:11px;font-weight:500;color:var(--text2);line-height:1.3}
.pip.ck .pn,.pip.ck .pd{color:#fff}
.pip.td .pn,.pip.td .pd{color:#185FA5;font-weight:600}
.pip.td.ck .pn,.pip.td.ck .pd{color:#fff}
.card.absent .pip{opacity:.4;pointer-events:none}
.card-footer{display:flex;justify-content:flex-end;gap:6px;margin-top:6px}
.edbtn{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg2)}
.edbtn:hover{border-color:var(--g);color:var(--g)}
.empty{font-size:13px;color:var(--text3);padding:8px 2px}
.loading{text-align:center;padding:3rem;color:var(--text3);font-size:14px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--bg);border-radius:var(--rl);padding:1.5rem;width:380px;border:0.5px solid var(--border);max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1rem}
.modal label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;margin-top:12px}
.modal select,.modal textarea,.modal input[type=time]{width:100%;padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--r);font-size:13px;font-family:inherit;color:var(--text);background:var(--bg);outline:none}
.modal select:focus,.modal textarea:focus,.modal input:focus{border-color:var(--g)}
.modal textarea{height:110px;resize:vertical}
.dg7{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:4px}
.dgb{padding:6px 2px;border-radius:var(--r);border:0.5px solid var(--border);font-size:12px;cursor:pointer;text-align:center;background:var(--bg2);color:var(--text2)}
.dgb:hover{border-color:var(--g)}
.dgb.on{background:#378ADD;color:#fff;border-color:#185FA5;font-weight:600}
.mbtns{display:flex;gap:6px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap}
.mbtn{padding:7px 16px;border-radius:var(--r);border:0.5px solid var(--border2);font-size:13px;cursor:pointer;background:var(--bg);color:var(--text)}
.mbtn:hover{background:var(--bg2)}
.mbtn.p{background:var(--g);color:#fff;border-color:var(--g2)}
.mbtn.d{background:#E24B4A;color:#fff;border-color:#A32D2D}
.stutop{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.stunm{font-size:17px;font-weight:600}
.stucls{font-size:12px;color:var(--text2);background:var(--bg2);padding:2px 8px;border-radius:var(--r)}
.sec-ttl{font-size:12px;color:var(--text2);margin-top:14px;margin-bottom:6px;font-weight:500}
.drow{padding:8px 0;border-bottom:0.5px solid var(--border)}
.drow:last-child{border-bottom:none}
.drow-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dlbl{font-size:13px;font-weight:500;color:var(--text);width:40px;flex-shrink:0}
.cm{font-size:10px;color:var(--g)}
.ds{padding:4px 10px;border-radius:var(--r);border:0.5px solid var(--border);font-size:12px;cursor:pointer;background:var(--bg2);color:var(--text2)}
.ds:hover{border-color:var(--g)}
.ds.ok{background:var(--g);color:#fff;border-color:var(--g2)}
.dpicker{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dpb{padding:4px 2px;border-radius:6px;border:0.5px solid var(--border);font-size:11px;cursor:pointer;text-align:center;background:var(--bg2);color:var(--text2);transition:all .12s}
.dpb:hover{border-color:var(--g)}
.dpb.on{background:#378ADD;color:#fff;border-color:#185FA5;font-weight:600}
.dlrow{display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 10px;background:var(--bg2);border-radius:var(--r);border:0.5px solid var(--border)}
.dlrow label{font-size:12px;color:var(--text2);margin:0;flex-shrink:0}
.dlrow input{flex:1;padding:5px 8px;border:0.5px solid var(--border2);border-radius:var(--r);font-size:12px;background:var(--bg);color:var(--text);outline:none;min-width:0}
.dlnote{font-size:11px;color:var(--text3);white-space:nowrap}
.reset-confirm{background:#FCEBEB;border:0.5px solid #F09595;border-radius:var(--r);padding:10px;margin-top:12px;font-size:13px;color:#791F1F}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>과제 제출 현황</h1>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div class="save-row"><div class="dot" id="dot"></div><span id="stxt">연결 중...</span></div>
      <div class="chips">
        <div class="chip">제출 <b id="cd">0</b></div>
        <div class="chip">미제출 <b id="cl">0</b></div>
        <div class="chip">결석 <b id="ca">0</b></div>
      </div>
    </div>
  </div>
  <div class="toolbar">
    <button class="tbtn on" id="f-all" onclick="setF('all')">전체</button>
    <button class="tbtn" id="f-missing" onclick="setF('missing')">미제출만</button>
    <button class="tbtn" id="f-absent" onclick="setF('absent')">결석</button>
    <div class="sep"></div>
    <button class="tbtn" onclick="openRoster()">학생 명단 편집</button>
    <input class="search" id="search" placeholder="이름·기수 검색" oninput="render()">
  </div>
  <div id="main"><div class="loading">🔄 데이터 불러오는 중...</div></div>
</div>

<div class="modal-bg" id="sm">
  <div class="modal">
    <div class="stutop"><span class="stunm" id="smn"></span><span class="stucls" id="smc"></span></div>
    <div class="dlrow">
      <label>마감</label>
      <input type="time" id="smdt" onchange="saveDl()">
      <span class="dlnote" id="smdn"></span>
    </div>
    <div class="sec-ttl">일차별 요일 · 제출 현황 <span style="font-weight:400;color:var(--text3)">(요일 버튼으로 개별 변경 가능)</span></div>
    <div id="smdy"></div>
    <div class="reset-confirm" id="reset-confirm" style="display:none">
      정말 이 학생의 제출 기록을 모두 초기화할까요?
      <div class="mbtns" style="margin-top:8px">
        <button class="mbtn" onclick="document.getElementById('reset-confirm').style.display='none'">취소</button>
        <button class="mbtn d" onclick="doReset()">초기화</button>
      </div>
    </div>
    <div class="mbtns">
      <button class="mbtn d" id="smab" onclick="togAbs()">결석 처리</button>
      <button class="mbtn" style="border-color:#F09595;color:#A32D2D" onclick="showResetConfirm()">기록 초기화</button>
      <button class="mbtn" onclick="closeSM()">닫기</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="rm">
  <div class="modal">
    <h3>학생 명단 편집</h3>
    <label>반 선택</label>
    <select id="rc" onchange="loadRC()"></select>
    <label>학생 이름 (한 줄에 하나씩)</label>
    <textarea id="rn"></textarea>
    <label>기본 시작 요일</label>
    <div class="dg7" id="rd"></div>
    <label>기본 마감 시간</label>
    <input type="time" id="rdl" value="23:00">
    <div class="mbtns">
      <button class="mbtn" onclick="closeRM()">취소</button>
      <button class="mbtn p" onclick="saveRoster()">저장</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDBqSYvKIRfBhs7uvdxCbdbVQ06NKBZCKc",
  authDomain: "homework-tracker-12e3b.firebaseapp.com",
  databaseURL: "https://homework-tracker-12e3b-default-rtdb.firebaseio.com",
  projectId: "homework-tracker-12e3b",
  storageBucket: "homework-tracker-12e3b.firebasestorage.app",
  messagingSenderId: "41587894017",
  appId: "1:41587894017:web:1b27271a94394bdaa55d00"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const W=['월','화','수','목','금','토','일'];

function makeDays(startDay){return Array.from({length:5},(_,i)=>(startDay+i)%7);}

const DEF_CLASSES=['31기','32기'];
const DEF_STUDENTS={
  '31기':[
    {name:'다은',gen:'31기',days:makeDays(4),checks:[false,false,false,false,false],absent:false,deadline:'00:30'},
    {name:'이안',gen:'31기',days:makeDays(4),checks:[false,false,false,false,false],absent:false,deadline:'23:30'},
    {name:'하은',gen:'31기',days:makeDays(6),checks:[false,false,false,false,false],absent:false,deadline:'00:30'},
    {name:'채현',gen:'31기',days:makeDays(5),checks:[false,false,false,false,false],absent:false,deadline:'23:30'},
    {name:'지인',gen:'31기',days:makeDays(5),checks:[false,false,false,false,false],absent:false,deadline:'00:30'},
  ],
  '32기':[
    {name:'서영',gen:'32기',days:makeDays(4),checks:[false,false,false,false,false],absent:false,deadline:'18:00'},
    {name:'채원',gen:'32기',days:makeDays(4),checks:[false,false,false,false,false],absent:false,deadline:'00:30'},
    {name:'나윤',gen:'32기',days:makeDays(4),checks:[false,false,false,false,false],absent:false,deadline:'00:30'},
    {name:'하언',gen:'32기',days:makeDays(4),checks:[false,false,false,false,false],absent:false,deadline:'00:30'},
    {name:'서욱',gen:'32기',days:makeDays(4),checks:[false,false,false,false,false],absent:false,deadline:'02:00'},
    {name:'찬영',gen:'32기',days:makeDays(4),checks:[false,false,false,false,false],absent:false,deadline:'00:00'},
    {name:'현준',gen:'32기',days:makeDays(4),checks:[false,false,false,false,false],absent:false,deadline:'00:00'},
    {name:'이삭',gen:'32기',days:makeDays(4),checks:[false,false,false,false,false],absent:false,deadline:'00:00'},
    {name:'하윤',gen:'32기',days:makeDays(4),checks:[false,false,false,false,false],absent:false,deadline:'01:30'},
    {name:'시연',gen:'32기',days:makeDays(4),checks:[false,false,false,false,false],absent:false,deadline:'00:00'},
  ]
};

let C=[],S={},fm='all',MT=null,rstDay=0;

function setSS(s){
  const dot=document.getElementById('dot'),t=document.getElementById('stxt');
  if(s==='ok'){dot.className='dot ok';t.textContent='실시간 연결됨';}
  else if(s==='saving'){dot.className='dot';t.textContent='저장 중...';}
  else if(s==='err'){dot.className='dot err';t.textContent='연결 오류';}
  else{dot.className='dot';t.textContent='연결 중...';}
}
function tdi(){const d=new Date().getDay();return d===0?6:d-1;}
function dlLbl(dl){
  if(!dl)return '';
  const[h,m]=dl.split(':').map(Number);
  const nx=h<6,ts=m===0?`${h}시`:`${h}:${String(m).padStart(2,'0')}`;
  return nx?`다음날 ${ts}`:`당일 ${ts}`;
}
function isUrg(s){
  if(!s.deadline||s.absent||s.checks.every(Boolean))return false;
  const now=new Date();const[h,m]=s.deadline.split(':').map(Number);
  let dl=new Date(now);if(h<6)dl.setDate(dl.getDate()+1);
  dl.setHours(h,m,0,0);return(dl-now)>0&&(dl-now)<=36e5;
}
function allDone(s){return s.checks.every(Boolean);}
function todaySlot(s){return(s.days||[]).indexOf(tdi());}

function saveAll(){
  setSS('saving');
  set(ref(db,'data'),{classes:C,students:S}).then(()=>setSS('ok')).catch(()=>setSS('err'));
}
function saveStu(cls,idx){
  setSS('saving');
  set(ref(db,`data/students/${cls}/${idx}`),S[cls][idx]).then(()=>setSS('ok')).catch(()=>setSS('err'));
}
function normStu(s){
  const checks=s.checks?Object.values(s.checks):[false,false,false,false,false];
  let days;
  if(s.days) days=Object.values(s.days).map(Number);
  else if(s.startDay!=null) days=makeDays(s.startDay);
  else days=makeDays(4);
  return{...s,checks,days};
}

onValue(ref(db,'data'),snap=>{
  const d=snap.val();
  if(d){
    C=d.classes||DEF_CLASSES;S={};
    (d.classes||DEF_CLASSES).forEach(cls=>{
      const raw=d.students&&d.students[cls];
      S[cls]=raw?Object.values(raw).map(normStu):JSON.parse(JSON.stringify(DEF_STUDENTS[cls]||[]));
    });
  } else {
    C=JSON.parse(JSON.stringify(DEF_CLASSES));
    S=JSON.parse(JSON.stringify(DEF_STUDENTS));
    saveAll();
  }
  setSS('ok');render();
  if(MT)rSMdy();
},()=>setSS('err'));

function setF(f){
  fm=f;['all','missing','absent'].forEach(x=>document.getElementById('f-'+x).classList.toggle('on',x===f));render();
}
function render(){
  const q=document.getElementById('search').value.trim();
  let td=0,tl=0,ta=0,html='';
  C.forEach(cls=>{
    const all=S[cls]||[];
    const list=all.filter(s=>{
      if(q&&!s.name.includes(q)&&!s.gen.includes(q))return false;
      if(fm==='missing')return !s.absent&&!allDone(s);
      if(fm==='absent')return s.absent;
      return true;
    });
    const cDone=all.filter(s=>allDone(s)&&!s.absent).length;
    const cAbs=all.filter(s=>s.absent).length;
    td+=cDone;ta+=cAbs;tl+=(all.length-cDone-cAbs);
    html+=`<div class="section"><div class="sec-hdr"><span class="sec-lbl">${cls}</span><span class="sec-stat">완료 ${cDone}/${all.length} · 결석 ${cAbs}명</span></div>`;
    if(!list.length){html+=`<div class="empty">해당 학생 없음</div>`;}
    else{
      html+=`<div class="grid">`;
      list.forEach(s=>{
        const ri=all.indexOf(s),ts=todaySlot(s);
        const dn=allDone(s),ab=s.absent,ug=isUrg(s),dl=dlLbl(s.deadline);
        const pips=(s.days||[]).map((di,i)=>{
          const ck=s.checks[i],it=i===ts;
          return `<div class="pip${ck?' ck':''}${it?' td':''}" onclick="togPip('${cls}',${ri},${i})"><span class="pn">${i+1}</span><span class="pd">${W[di]}</span></div>`;
        }).join('');
        html+=`<div class="card${dn&&!ab?' done':''}${ab?' absent':''}${ug?' urgent':''}">
          <div class="card-top">
            <div class="av">${s.name[0]}</div>
            <div class="ng"><span class="sname">${s.name}</span><span class="gtag">${s.gen}</span></div>
            ${dl?`<span class="dbadge" onclick="openSM('${cls}',${ri})">⏰ ${dl}</span>`:''}
          </div>
          <div class="pips">${pips}</div>
          <div class="card-footer"><span class="edbtn" onclick="openSM('${cls}',${ri})">일정 조정</span></div>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  document.getElementById('main').innerHTML=html;
  document.getElementById('cd').textContent=td;
  document.getElementById('cl').textContent=tl;
  document.getElementById('ca').textContent=ta;
}

window.togPip=function(cls,idx,slot){
  const s=S[cls][idx];if(s.absent)return;
  s.checks[slot]=!s.checks[slot];saveStu(cls,idx);render();
};
window.openSM=function(cls,idx){
  MT={cls,idx};const s=S[cls][idx];
  document.getElementById('smn').textContent=s.name;
  document.getElementById('smc').textContent=s.gen;
  document.getElementById('smab').textContent=s.absent?'결석 해제':'결석 처리';
  document.getElementById('smdt').value=s.deadline||'';
  document.getElementById('smdn').textContent=dlLbl(s.deadline);
  document.getElementById('reset-confirm').style.display='none';
  rSMdy();
  document.getElementById('sm').classList.add('show');
};
function rSMdy(){
  if(!MT)return;
  const{cls,idx}=MT,s=S[cls][idx],ts=todaySlot(s);
  document.getElementById('smdy').innerHTML=(s.days||[]).map((dayIdx,i)=>{
    const ck=s.checks[i],it=i===ts;
    const dayBtns=W.map((d,di)=>`<div class="dpb${dayIdx===di?' on':''}" onclick="setDaySlot(${i},${di})">${d}</div>`).join('');
    return `<div class="drow">
      <div class="drow-top">
        <span class="dlbl">${i+1}일차${it?'<span class="cm"> ◀오늘</span>':''}</span>
        <button class="ds${ck?' ok':''}" onclick="togSlot(${i})">${ck?'✓ 제출':'미제출'}</button>
      </div>
      <div class="dpicker">${dayBtns}</div>
    </div>`;
  }).join('');
}
window.setDaySlot=function(slotIdx,dayIdx){
  const{cls,idx}=MT;
  S[cls][idx].days[slotIdx]=dayIdx;
  saveStu(cls,idx);rSMdy();render();
};
window.togSlot=function(i){
  const{cls,idx}=MT;S[cls][idx].checks[i]=!S[cls][idx].checks[i];
  rSMdy();saveStu(cls,idx);render();
};
window.saveDl=function(){
  const{cls,idx}=MT,v=document.getElementById('smdt').value;
  S[cls][idx].deadline=v;document.getElementById('smdn').textContent=dlLbl(v);
  saveStu(cls,idx);render();
};
window.togAbs=function(){
  const{cls,idx}=MT;S[cls][idx].absent=!S[cls][idx].absent;
  document.getElementById('smab').textContent=S[cls][idx].absent?'결석 해제':'결석 처리';
  saveStu(cls,idx);render();
};
window.showResetConfirm=function(){document.getElementById('reset-confirm').style.display='block';};
window.doReset=function(){
  const{cls,idx}=MT;
  S[cls][idx].checks=[false,false,false,false,false];
  S[cls][idx].absent=false;
  document.getElementById('reset-confirm').style.display='none';
  document.getElementById('smab').textContent='결석 처리';
  rSMdy();saveStu(cls,idx);render();
};
window.closeSM=function(){document.getElementById('sm').classList.remove('show');MT=null;};
window.openRoster=function(){
  const sel=document.getElementById('rc');
  sel.innerHTML=C.map(c=>`<option value="${c}">${c}</option>`).join('');
  rstDay=0;rRD();loadRC();document.getElementById('rm').classList.add('show');
};
function rRD(){document.getElementById('rd').innerHTML=W.map((d,i)=>`<div class="dgb${rstDay===i?' on':''}" onclick="setRD(${i})">${d}</div>`).join('');}
window.setRD=function(i){rstDay=i;rRD();};
window.loadRC=function(){
  const cls=document.getElementById('rc').value;
  document.getElementById('rn').value=(S[cls]||[]).map(s=>s.name).join('\n');
};
window.closeRM=function(){document.getElementById('rm').classList.remove('show');};
window.saveRoster=function(){
  const cls=document.getElementById('rc').value;
  const names=document.getElementById('rn').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const dl=document.getElementById('rdl').value||'23:00';
  const ex=S[cls]||[];
  S[cls]=names.map(name=>{
    const f=ex.find(s=>s.name===name);
    return f||{name,gen:cls,days:makeDays(rstDay),checks:[false,false,false,false,false],absent:false,deadline:dl};
  });
  closeRM();saveAll();render();
};
setInterval(render,60000);
</script>
</body>
</html>
